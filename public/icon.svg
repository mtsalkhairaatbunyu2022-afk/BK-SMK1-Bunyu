<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Colors from the logo -->
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#FFB300" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Blue background circle -->
  <circle cx="256" cy="256" r="230" fill="#3D85C6" stroke="#FFD700" stroke-width="12" />
  
  <!-- The Yellow Outer Ring/Curve -->
  <path d="M440 256 A184 184 0 1 0 72 256 A184 184 0 0 0 440 256" fill="none" stroke="#FFD700" stroke-width="60" />
  
  <!-- Left Side thick curve -->
  <path d="M256 72 A184 184 0 0 0 72 256 A184 184 0 0 0 256 440" fill="none" stroke="#FFD700" stroke-width="85" stroke-linecap="round" />

  <!-- Vertical bar with small circle -->
  <rect x="236" y="100" width="40" height="340" fill="#FFD700" />
  <circle cx="256" cy="180" r="70" fill="none" stroke="#FFD700" stroke-width="35" />

  <!-- Bottom "KONSELOR" base -->
  <rect x="250" y="400" width="220" height="60" fill="#FFD700" rx="5" />
  <text x="360" y="445" font-family="Arial, sans-serif" font-weight="900" font-size="34" fill="#3D85C6" text-anchor="middle" letter-spacing="-1">KONSELOR</text>

  <!-- Shadow/Border to give depth -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#333" stroke-width="2" opacity="0.2" />
</svg>
